    align-items: center;
    justify-content: space-between;

    padding-bottom: 0.75rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.8rem;
  }

    font-weight: 600;
    background: linear-gradient(130deg, #3b6e9e, #5f9ea0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .score-badge {
    background: #d4e9ff;
    border-radius: 60px;
    padding: 0.4rem 1.2rem;
    font-size: 1.3rem;
    font-weight: 600;
    color: #2f5575;
    border: 1px solid #9fc9ff;
    box-shadow: inset 0 1px 4px #f0faff, 0 3px 0 #9cb9d9;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .score-badge span {
    background: #bed9ff;
    padding: 0.2rem 0.9rem;
    border-radius: 40px;
    color: #1a3e5c;
    font-size: 1.4rem;
    line-height: 1;
    border: 1px solid #8ab9f0;
  }

    background: #f1faff;
    border-radius: 2rem;
    padding: 1.8rem 1.5rem 1.5rem;
    margin: 1.2rem 0 1rem;
    border: 1px solid #c5ddff;
    box-shadow: inset 0 4px 8px #e4f2ff, 0 6px 0 #b0cbea;
  }

    font-size: 1.6rem;
    font-weight: 500;
    line-height: 1.4;
    color: #1f4766;
    text-shadow: 0 1px 2px #e4f0ff;
    margin-bottom: 1.5rem;
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .option-btn {
    background: #e6f2ff;
    border: 2px solid #b6d5ff;
    border-radius: 50px;
    padding: 0.9rem 1.5rem;
    font-size: 1.2rem;
    font-weight: 500;
    text-align: left;
    color: #1b3a54;
    cursor: pointer;
    transition: 0.12s ease;
    box-shadow: 0 5px 0 #9cb9dc, 0 3px 10px rgba(120, 160, 210, 0.3);
  }

  .option-btn:hover:not(:disabled) {
    background: #d5e9ff;
    border-color: #88b8f0;
    transform: scale(1.01);
  }

  .option-btn.correct-highlight {
    background: #d4f0d4;
    border-color: #5eb85e;
    color: #1f5420;
    box-shadow: 0 0 12px #9ae6b0, 0 5px 0 #4a934a;
  }

    background: #ffe0e0;
    border-color: #ff9494;
    color: #a13131;
    box-shadow: 0 0 12px #ffb5b5, 0 5px 0 #c75c5c;
  }

  .option-btn:disabled {
    opacity: 0.9;
    cursor: not-allowed;
    filter: saturate(0.6);
  }

    min-height: 2.8rem;
    margin: 1.5rem 0 1rem;
    font-size: 1.3rem;
    font-weight: 500;
    padding: 0.7rem 1.4rem;
    border-radius: 50px;
    background: #e1f0ff;
    display: flex;
    align-items: center;
    gap: 0.6rem;

    color: #234d6b;

  .red-feedback { color: #bc2c2c; font-weight: 600; }

    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
    margin-top: 1.5rem;

    background: #cde3ff;
    border: none;
    border-radius: 3rem;
    padding: 0.7rem 1.8rem;
    font-size: 1.2rem;
    font-weight: 600;
    color: #1f4a70;
    border-bottom: 4px solid #7fa3c7;
    letter-spacing: 0.02rem;
    cursor: pointer;
    transition: 0.1s ease;
    box-shadow: 0 5px 10px rgba(90, 130, 180, 0.2);

    align-items: center;
    gap: 0.4rem;

    background: #b9d7ff;
    border-bottom-color: #6087b0;
    transform: translateY(-2px);
  }

    opacity: 0.4;
    cursor: default;
    filter: grayscale(0.4);

    padding: 0.5rem 1.4rem;
    border-radius: 60px;
    color: #26557c;
    border: 1px solid #9ec3ec;

    background: #c2dcff;
    border-bottom-color: #6f94bc;
    padding: 0.7rem 1.6rem;

    .slide-indicator { font-size: 1rem; padding: 0.4rem 1rem; }
    .quiz-container { padding: 1.2rem 1rem 1.5rem; }

    // ---------- state ----------
    let currentSlide = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let answerLocked = new Array(questions.length).fill(false);

    // DOM elements
    const questionEl = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedbackTextEl = document.getElementById('feedbackText');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const slideIndicator = document.getElementById('slideIndicator');
    const scoreDisplay = document.getElementById('scoreDisplay');

    // update score
    function updateScore() {
      let correctCount = 0;
      for (let i = 0; i < questions.length; i++) {
        if (answerLocked[i] && userAnswers[i] === questions[i].correct) {
          correctCount++;
        }
      }
      scoreDisplay.textContent = `${correctCount}/${questions.length}`;
    }

    // render current slide
    function renderSlide() {
      const q = questions[currentSlide];
      if (!q) return;

      questionEl.textContent = q.question;
      const locked = answerLocked[currentSlide];
      const selectedIdx = userAnswers[currentSlide];
      const correctIdx = q.correct;

      let htmlStr = '';
      q.options.forEach((opt, idx) => {
        let btnClass = 'option-btn';
        if (locked) {
          if (idx === correctIdx) {
            btnClass += ' correct-highlight';
          }
          if (selectedIdx !== null && idx === selectedIdx && idx !== correctIdx) {
            btnClass += ' wrong-highlight';
          }
        }
        const disabledAttr = locked ? 'disabled' : '';
        htmlStr += `<button class="${btnClass}" data-opt-index="${idx}" ${disabledAttr}>${opt}</button>`;
      });
      optionsContainer.innerHTML = htmlStr;

      // feedback
      if (locked && selectedIdx !== null) {
        if (selectedIdx === correctIdx) {
          feedbackTextEl.innerHTML = `<span class="green-feedback">✅ correct!</span>`;
        } else {
          const correctAnswerText = q.options[correctIdx];
          feedbackTextEl.innerHTML = `<span class="red-feedback">❌ wrong. correct: </span><span class="green-feedback">"${correctAnswerText}"</span>`;
        }
      } else {
        feedbackTextEl.textContent = '⚡ choose an option';
      }

      prevBtn.disabled = (currentSlide === 0);
      nextBtn.disabled = (currentSlide === questions.length - 1);
      slideIndicator.textContent = `${currentSlide+1} / ${questions.length}`;
    }

    // click handler
    function onOptionClick(e) {
      const target = e.target.closest('.option-btn');
      if (!target || target.disabled) return;
      if (answerLocked[currentSlide]) return;

      const idx = parseInt(target.dataset.optIndex, 10);
      answerLocked[currentSlide] = true;
      userAnswers[currentSlide] = idx;

      renderSlide();
      updateScore();
    }

    function goToPrev() {
      if (currentSlide > 0) {
        currentSlide--;
        renderSlide();
      }
    }

    function goToNext() {
      if (currentSlide < questions.length - 1) {
        currentSlide++;
        renderSlide();
      }
    }

    function resetQuiz() {
      currentSlide = 0;
      userAnswers = new Array(questions.length).fill(null);
      answerLocked = new Array(questions.length).fill(false);
      renderSlide();
      updateScore();
    }

    // attach events
    optionsContainer.addEventListener('click', onOptionClick);
    prevBtn.addEventListener('click', goToPrev);
    nextBtn.addEventListener('click', goToNext);
    resetBtn.addEventListener('click', resetQuiz);

    // initial render
    if (questions.length) {
      renderSlide();
      updateScore();
    } else {
      questionEl.textContent = '❗ No questions.';
    }
  })();
